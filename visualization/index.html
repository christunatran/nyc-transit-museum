<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYC Subway Map</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: black;
        }

        svg {
            display: block;
        }

        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            padding: 12px;
            border-radius: 8px;
            max-height: 90vh;
            overflow-y: auto;
        }

        #controls label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 2px 0;
            font-size: 13px;
        }

        #controls .route-swatch {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        #controls h3 {
            margin: 0 0 8px;
            font-size: 14px;
        }

        #year-display {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #year-hint {
            font-size: 11px;
            color: #555;
            margin-bottom: 10px;
        }

        .tooltip {
            position: absolute;
            background: white;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 20;
            max-width: 280px;
        }

        .tooltip .name {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>
    <div id="controls"></div>
    <div id="plot"></div>
    <div class="tooltip" id="tooltip"></div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;
        const margin = 20;

        const companyColors = {
            "IRT": "#d62728",
            "BMT": "#2ca02c",
            "IND": "#1f77b4"
        };
        const UNKNOWN_COLOR = "#888";

        function companyColor(c) {
            return companyColors[c] || UNKNOWN_COLOR;
        }

        const tooltip = d3.select("#tooltip");

        const MIN_YEAR = 1920;
        const MAX_YEAR = 1945;
        let currentYear = MIN_YEAR;
        let routeThickness = 6;

        // Build a filled polygon (ribbon) along a polyline by offsetting each
        // vertex perpendicular to the direction of travel. Miter joins are
        // capped to avoid spikes on sharp turns.
        function ribbonPoints(points, halfWidth) {
            if (!points || points.length < 2) return "";
            const n = points.length;
            const left = new Array(n), right = new Array(n);
            const MITER_LIMIT = 4;
            for (let i = 0; i < n; i++) {
                const [px, py] = points[i];
                let nx, ny;
                if (i === 0) {
                    const [qx, qy] = points[1];
                    const dx = qx - px, dy = qy - py;
                    const len = Math.hypot(dx, dy) || 1;
                    nx = -dy / len; ny = dx / len;
                } else if (i === n - 1) {
                    const [qx, qy] = points[n - 2];
                    const dx = px - qx, dy = py - qy;
                    const len = Math.hypot(dx, dy) || 1;
                    nx = -dy / len; ny = dx / len;
                } else {
                    const [ax, ay] = points[i - 1];
                    const [bx, by] = points[i + 1];
                    const l1 = Math.hypot(px - ax, py - ay) || 1;
                    const n1x = -(py - ay) / l1, n1y = (px - ax) / l1;
                    const l2 = Math.hypot(bx - px, by - py) || 1;
                    const n2x = -(by - py) / l2, n2y = (bx - px) / l2;
                    const mx = n1x + n2x, my = n1y + n2y;
                    const mlen = Math.hypot(mx, my);
                    if (mlen < 1e-6) {
                        nx = n1x; ny = n1y;
                    } else {
                        const cosHalf = (mx * n1x + my * n1y) / mlen;
                        let scale = cosHalf > 1e-3 ? 1 / cosHalf : MITER_LIMIT;
                        if (scale > MITER_LIMIT) scale = MITER_LIMIT;
                        nx = (mx / mlen) * scale;
                        ny = (my / mlen) * scale;
                    }
                }
                left[i] = [px + nx * halfWidth, py + ny * halfWidth];
                right[i] = [px - nx * halfWidth, py - ny * halfWidth];
            }
            const poly = left.concat(right.reverse());
            return poly.map(p => `${p[0].toFixed(2)},${p[1].toFixed(2)}`).join(" ");
        }

        // ---- Fuzzy matching helpers ----
        function normalizeLabel(s) {
            if (!s) return "";
            return s.toLowerCase()
                .replace(/\(.*?\)/g, " ")
                .replace(/\belevated\b/g, " ")
                .replace(/\bel\b/g, " ")
                .replace(/\bst\b/g, "street")
                .replace(/\bsts\b/g, "streets")
                .replace(/\bave?\b/g, "avenue")
                .replace(/\bsq\b/g, "square")
                .replace(/\bbklyn\b/g, "brooklyn")
                .replace(/[^a-z0-9 ]/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function bigramCounts(s) {
            const m = new Map();
            for (let i = 0; i < s.length - 1; i++) {
                const bg = s.substr(i, 2);
                m.set(bg, (m.get(bg) || 0) + 1);
            }
            return m;
        }

        function diceSim(a, b) {
            if (!a || !b) return 0;
            if (a === b) return 1;
            if (a.length < 2 || b.length < 2) return 0;
            const A = bigramCounts(a), B = bigramCounts(b);
            let shared = 0, totalA = 0, totalB = 0;
            A.forEach(v => totalA += v);
            B.forEach(v => totalB += v);
            A.forEach((ca, bg) => { shared += Math.min(ca, B.get(bg) || 0); });
            return (2 * shared) / (totalA + totalB);
        }

        function allNumbers(s) {
            const m = s.match(/\d+/g);
            return m ? new Set(m) : new Set();
        }

        // Dice similarity with a street-number constraint: different numbers are a
        // strong signal of different stations (e.g. "14 St./6 Av." ≠ "14 St./2 Av.").
        // When both sides contain numbers but they disagree, penalize.
        function fuzzyScore(a, b) {
            let score = diceSim(a, b);
            const na = allNumbers(a), nb = allNumbers(b);
            if (na.size > 0 && nb.size > 0) {
                const sameSet = na.size === nb.size && [...na].every(x => nb.has(x));
                if (!sameSet) {
                    let shared = 0;
                    na.forEach(x => { if (nb.has(x)) shared++; });
                    score *= shared === 0 ? 0.3 : 0.5;
                }
            }
            return score;
        }

        function bestMatch(query, candidates, threshold) {
            const qNorm = normalizeLabel(query);
            if (!qNorm) return null;
            let best = null, bestScore = threshold;
            for (const c of candidates) {
                const s = fuzzyScore(qNorm, c.norm);
                if (s > bestScore) { bestScore = s; best = c; }
            }
            return best;
        }

        Promise.all([
            d3.json("./maps/nyc.json"),
            d3.json("./data/historical-lines.json"),
            d3.csv("../archival-ridership-data/cleaned_data/master_ridership_linked.csv"),
            d3.csv("../modern-subway-data/station-neighbors.csv")
        ]).then(([nyc, historicalLines, ridershipData, modernStationData]) => {
            const projection = d3.geoConicConformal()
                .rotate([96, -39])
                .fitExtent([[margin, margin], [width - margin, height - margin]], nyc);

            const geoPath = d3.geoPath().projection(projection);

            // ---- Ridership index (drives circle radius only) ----
            // Sum ridership across boroughs/segments that share a label in the same
            // year, then carry forward so a station with no data in the selected
            // year still renders at its last-known size.
            const ridershipByYearMap = new Map();
            ridershipData.forEach(row => {
                const year = +row.year;
                const norm = normalizeLabel(row.label);
                if (!norm || !Number.isFinite(year)) return;
                const val = +row.ridership || 0;
                if (!ridershipByYearMap.has(year)) ridershipByYearMap.set(year, new Map());
                const m = ridershipByYearMap.get(year);
                const prev = m.get(norm);
                m.set(norm, {
                    label: row.label,
                    norm,
                    ridership: (prev ? prev.ridership : 0) + val,
                    year
                });
            });

            const cumulativeRidership = new Map();
            {
                const running = new Map();
                for (let y = MIN_YEAR; y <= MAX_YEAR; y++) {
                    const m = ridershipByYearMap.get(y);
                    if (m) m.forEach((v, k) => running.set(k, v));
                    cumulativeRidership.set(y, new Map(running));
                }
            }

            let maxRidership = 0;
            cumulativeRidership.forEach(m => m.forEach(v => {
                if (v.ridership > maxRidership) maxRidership = v.ridership;
            }));
            const radiusScale = d3.scaleSqrt()
                .domain([0, Math.max(1, maxRidership)])
                .range([1.8, 9]);
            const DEFAULT_RADIUS = 2;

            // Fuzzy-match a historical station name to the ridership label index
            // available through the selected year. Cache per (year, name).
            const ridershipCache = new Map();
            function ridershipFor(year, stationName) {
                const cacheKey = `${year}|${stationName}`;
                if (ridershipCache.has(cacheKey)) return ridershipCache.get(cacheKey);
                const map = cumulativeRidership.get(year);
                let best = null, bestScore = 0.6;
                if (map) {
                    const q = normalizeLabel(stationName);
                    if (q) {
                        map.forEach(r => {
                            const s = fuzzyScore(q, r.norm);
                            if (s > bestScore) { bestScore = s; best = r; }
                        });
                    }
                }
                ridershipCache.set(cacheKey, best);
                return best;
            }

            // ---- Historical lines: decorate ----
            historicalLines.forEach(line => {
                line.lineId = line.line.replace(/[^A-Za-z0-9]/g, "_");
                line.displayName = line.line.replace(/_/g, " ");
                line.stations.forEach((s, i) => {
                    s.id = `${line.lineId}|${i}|${s.station}`;
                    s.hasCoords = Number.isFinite(s.latitude) && Number.isFinite(s.longitude);
                    s.company = (s.company || line.company || "").toUpperCase();
                });
            });

            // ---- Wrong-borough detection via polygon containment ----
            // Station names like "168th Street" recur across boroughs, so a
            // spreadsheet coord may point at a namesake in the wrong borough.
            // Strategy:
            //   1. Tag each located station with a borough by testing its coords
            //      against nyc.json neighborhood polygons.
            //   2. For each line, the "valid" boroughs are those that hold at
            //      least BOROUGH_SHARE of the line's located stations.
            //   3. For any station whose borough falls outside that set (or is
            //      null = outside NYC), look up modern same-name stations and
            //      snap to the one in a valid borough closest to the line
            //      centroid. Skip if no such namesake exists within MATCH_KM.
            function haversineKm(lat1, lng1, lat2, lng2) {
                const R = 6371;
                const toRad = x => x * Math.PI / 180;
                const dLat = toRad(lat2 - lat1);
                const dLng = toRad(lng2 - lng1);
                const a = Math.sin(dLat / 2) ** 2
                    + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
                return 2 * R * Math.asin(Math.sqrt(a));
            }

            // Modern CSV uses abbreviations; nyc.json uses full names.
            const MODERN_BOROUGH = {
                "M": "Manhattan",
                "Bx": "Bronx",
                "Bk": "Brooklyn",
                "Q": "Queens",
                "SI": "Staten Island"
            };

            function findBorough(lat, lng) {
                if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
                const pt = [lng, lat];
                for (const f of nyc.features) {
                    if (d3.geoContains(f, pt)) return f.properties.borough || null;
                }
                return null;
            }

            historicalLines.forEach(line => {
                line.stations.forEach(s => {
                    if (s.hasCoords) s.borough = findBorough(s.latitude, s.longitude);
                });
            });

            const modernByNorm = new Map();
            {
                const seenIds = new Set();
                modernStationData.forEach(d => {
                    if (!d.latitude || !d.longitude) return;
                    if (seenIds.has(d.station_id)) return;
                    seenIds.add(d.station_id);
                    // stop_name is the short, colloquial form (e.g. "103 St")
                    // whereas station_name is suffixed ("103RD STREET-LEXINGTON"),
                    // which hurts fuzzy match scores. Fall back to station_name
                    // if stop_name is missing.
                    const rawName = d.stop_name || d.station_name;
                    const norm = normalizeLabel(rawName);
                    if (!norm) return;
                    if (!modernByNorm.has(norm)) modernByNorm.set(norm, []);
                    modernByNorm.get(norm).push({
                        name: d.station_name,
                        stopName: d.stop_name,
                        borough: MODERN_BOROUGH[d.borough] || d.borough,
                        lat: +d.latitude,
                        lng: +d.longitude
                    });
                });
            }
            const modernEntries = Array.from(modernByNorm, ([norm, candidates]) => ({ norm, candidates }));

            const FUZZY_THRESHOLD = 0.8;
            const MATCH_KM = 10;
            const MIN_BOROUGH_COUNT = 2;
            const NEIGHBOR_KM = 5;
            const corrected = [];
            const skipped = [];
            const trustedNoMatch = [];

            historicalLines.forEach(line => {
                const located = line.stations.filter(s => s.hasCoords);
                if (!located.length) return;

                const medianLat = d3.median(located, s => s.latitude);
                const medianLng = d3.median(located, s => s.longitude);

                // A borough is "valid" for this line if it contains at least
                // MIN_BOROUGH_COUNT stations. Single-station outliers stay
                // suspect; legitimate multi-station branches (e.g. Myrtle El
                // in Queens) are trusted.
                const boroughCounts = new Map();
                located.forEach(s => {
                    if (!s.borough) return;
                    boroughCounts.set(s.borough, (boroughCounts.get(s.borough) || 0) + 1);
                });
                const validBoroughs = new Set();
                boroughCounts.forEach((n, b) => { if (n >= MIN_BOROUGH_COUNT) validBoroughs.add(b); });

                located.forEach(s => {
                    if (s.borough && validBoroughs.has(s.borough)) return;

                    // Single-station cross-borough termini (e.g. York St on
                    // the IND Sixth Ave Line, just across the East River from
                    // East Broadway) sit close to their list-neighbors. If
                    // the coord is within NEIGHBOR_KM of an adjacent station,
                    // trust it — a spreadsheet typo would not land near a
                    // legitimate neighbor.
                    const idx = line.stations.indexOf(s);
                    let neighborDist = Infinity;
                    for (const j of [idx - 1, idx + 1]) {
                        const nb = line.stations[j];
                        if (!nb || !nb.hasCoords) continue;
                        const d = haversineKm(s.latitude, s.longitude, nb.latitude, nb.longitude);
                        if (d < neighborDist) neighborDist = d;
                    }
                    if (neighborDist <= NEIGHBOR_KM) {
                        trustedNoMatch.push({
                            line: line.displayName,
                            station: s.station,
                            coords: [s.latitude, s.longitude],
                            borough: s.borough || "outside NYC",
                            validBoroughs: Array.from(validBoroughs).join(", "),
                            reason: `adjacent to neighbor ${neighborDist.toFixed(1)}km away`
                        });
                        return;
                    }

                    const qNorm = normalizeLabel(s.station);
                    const matches = [];
                    if (qNorm) {
                        modernEntries.forEach(entry => {
                            if (fuzzyScore(qNorm, entry.norm) < FUZZY_THRESHOLD) return;
                            entry.candidates.forEach(c => matches.push(c));
                        });
                    }

                    // No modern same-name station exists anywhere — we have no
                    // evidence to override the spreadsheet, so keep the coord.
                    // Covers single-borough terminals like Park Row.
                    if (!matches.length) {
                        trustedNoMatch.push({
                            line: line.displayName,
                            station: s.station,
                            coords: [s.latitude, s.longitude],
                            borough: s.borough || "outside NYC",
                            validBoroughs: Array.from(validBoroughs).join(", "),
                            reason: "no same-name modern station"
                        });
                        return;
                    }

                    // Prefer namesakes in the line's valid-borough set.
                    const pool = matches.filter(m => validBoroughs.has(m.borough));

                    if (!pool.length) {
                        skipped.push({
                            line: line.displayName,
                            station: s.station,
                            coords: [s.latitude, s.longitude],
                            borough: s.borough || "outside NYC",
                            validBoroughs: Array.from(validBoroughs).join(", "),
                            reason: "no modern namesake in a valid borough"
                        });
                        s.hasCoords = false;
                        return;
                    }

                    let best = null, bestDist = Infinity;
                    pool.forEach(m => {
                        const d = haversineKm(medianLat, medianLng, m.lat, m.lng);
                        if (d < bestDist) { bestDist = d; best = m; }
                    });

                    if (bestDist <= MATCH_KM) {
                        corrected.push({
                            line: line.displayName,
                            station: s.station,
                            from: [s.latitude, s.longitude],
                            fromBorough: s.borough || "outside NYC",
                            to: [best.lat, best.lng],
                            toBorough: best.borough,
                            modernName: best.name,
                            distFromCentroidKm: +bestDist.toFixed(2)
                        });
                        s.latitude = best.lat;
                        s.longitude = best.lng;
                        s.borough = best.borough;
                    } else {
                        skipped.push({
                            line: line.displayName,
                            station: s.station,
                            coords: [s.latitude, s.longitude],
                            borough: s.borough || "outside NYC",
                            validBoroughs: Array.from(validBoroughs).join(", "),
                            reason: `closest valid-borough namesake ${bestDist.toFixed(1)}km from line centroid (> ${MATCH_KM}km)`
                        });
                        s.hasCoords = false;
                    }
                });
            });

            if (corrected.length) {
                console.log(`Corrected ${corrected.length} wrong-borough stations via polygon + modern lookup:`);
                console.table(corrected);
            }
            if (skipped.length) {
                console.log(`Skipped ${skipped.length} stations (wrong borough, no usable modern match):`);
                console.table(skipped);
            }
            if (trustedNoMatch.length) {
                console.log(`Trusted ${trustedNoMatch.length} coords in non-valid boroughs with no modern namesake:`);
                console.table(trustedNoMatch);
            }

            // ---- Edges between consecutive coord-bearing stations (post-correction) ----
            historicalLines.forEach(line => {
                const edges = [];
                let prev = null;
                line.stations.forEach(s => {
                    if (!s.hasCoords) return;
                    if (prev) edges.push({ source: prev, target: s, edgeKey: `${prev.id}~${s.id}` });
                    prev = s;
                });
                line.edges = edges;
            });

            function stationActive(s, year) {
                if (s.opened_year && s.opened_year > year) return false;
                if (s.closed_year && s.closed_year <= year) return false;
                return true;
            }

            const svg = d3.select("#plot").append("svg")
                .attr("width", width)
                .attr("height", height);

            svg.append("g")
                .selectAll("path")
                .data(nyc.features)
                .enter().append("path")
                .attr("d", geoPath)
                .attr("fill", "none")
                .attr("stroke", "#2a2a4a")
                .attr("stroke-width", 0.5);

            // Each historical line is a <g> inside a parent <g class="company-XXX">.
            const companyOrder = ["IRT", "BMT", "IND"];
            const companyGroups = {};
            companyOrder.forEach(co => {
                companyGroups[co] = svg.append("g").attr("class", `company-${co}`);
            });
            const unknownCompanyGroup = svg.append("g").attr("class", "company-unknown");

            const lineGroups = {};
            historicalLines.forEach(line => {
                const parent = companyGroups[line.company] || unknownCompanyGroup;
                const g = parent.append("g").attr("class", `line-${line.lineId}`);
                g.append("g").attr("class", "segments");
                g.append("g").attr("class", "stations");
                lineGroups[line.lineId] = g;
            });

            function renderYear(year) {
                d3.select("#year-display").text(year);

                historicalLines.forEach(line => {
                    const g = lineGroups[line.lineId];
                    const color = companyColor(line.company);

                    // Chain consecutive active edges into polylines, breaking
                    // at any gap (closed/unopened station) so each contiguous
                    // run renders as one filled ribbon polygon.
                    const polylines = [];
                    let current = null;
                    line.edges.forEach(e => {
                        const active = stationActive(e.source, year) && stationActive(e.target, year);
                        if (!active) { current = null; return; }
                        if (!current) {
                            current = {
                                key: e.source.id,
                                points: [projection([e.source.longitude, e.source.latitude])]
                            };
                            polylines.push(current);
                        }
                        current.points.push(projection([e.target.longitude, e.target.latitude]));
                        current.key += "~" + e.target.id;
                    });

                    const polySel = g.select(".segments").selectAll("polygon")
                        .data(polylines, d => d.key);
                    polySel.exit().remove();
                    polySel.enter().append("polygon")
                        .attr("opacity", 0.85)
                        .merge(polySel)
                        .attr("fill", color)
                        .attr("stroke", color)
                        .attr("stroke-width",.001)
                        .attr("points", d => ribbonPoints(d.points, routeThickness / 2));

                    const activeStations = line.stations.filter(s =>
                        s.hasCoords && stationActive(s, year));
                    /*
                    const dotSel = g.select(".stations").selectAll("circle")
                        .data(activeStations, d => d.id);
                    dotSel.exit().remove();
                    dotSel.enter().append("circle")
                        .attr("stroke", "#1a1a2e")
                        .attr("stroke-width", 0.6)
                        .on("mouseover", (event, d) => {
                            const r = ridershipFor(year, d.station);
                            const ridership = r ? r.ridership.toLocaleString() : "—";
                            const yearLabel = r && r.year !== year
                                ? `${r.year}, carried forward`
                                : `${year}`;
                            tooltip.style("display", "block")
                                .html(`
                                    <div class="name">${d.station}</div>
                                    <div>${line.company} · ${line.displayName}</div>
                                    <div>Ridership (${yearLabel}): ${ridership}</div>
                                    ${r ? `<div>Archival label: ${r.label}</div>` : ""}
                                    ${d.opened_raw ? `<div>Opened: ${d.opened_raw}</div>` : ""}
                                    ${d.closed_raw ? `<div>Closed: ${d.closed_raw}</div>` : ""}
                                `);
                        })
                        .on("mousemove", (event) => {
                            tooltip.style("left", (event.pageX + 12) + "px")
                                .style("top", (event.pageY - 12) + "px");
                        })
                        .on("mouseout", () => tooltip.style("display", "none"))
                        .merge(dotSel)
                        .attr("fill", color)
                        .attr("cx", d => projection([d.longitude, d.latitude])[0])
                        .attr("cy", d => projection([d.longitude, d.latitude])[1])
                        .attr("r", d => {
                            const r = ridershipFor(year, d.station);
                            return r ? radiusScale(r.ridership) : DEFAULT_RADIUS;
                        });
                    */
                });
            }

            // Controls: year display + company legend + per-line toggles
            const controls = d3.select("#controls");
            controls.append("div").attr("id", "year-display");
            controls.append("div").attr("id", "year-hint")
                .text("← / → to change year · Shift+S to save SVG");

            controls.append("h3").text("Route thickness");
            const thicknessRow = controls.append("label").style("display", "flex");
            const thicknessReadout = thicknessRow.append("span")
                .style("min-width", "32px")
                .text(`${routeThickness}px`);
            thicknessRow.append("input")
                .attr("type", "range")
                .attr("min", 1)
                .attr("max", 30)
                .attr("step", 1)
                .attr("value", routeThickness)
                .style("flex", "1")
                .on("input", function () {
                    routeThickness = +this.value;
                    thicknessReadout.text(`${routeThickness}px`);
                    renderYear(currentYear);
                });

            controls.append("h3").text("Company");
            ["IRT", "BMT", "IND"].forEach(co => {
                const label = controls.append("label");
                label.append("span").attr("class", "route-swatch")
                    .style("background-color", companyColors[co]);
                label.append("span").text(co);
            });

            controls.append("h3").text("Lines");
            const allLabel = controls.append("label");
            allLabel.append("input")
                .attr("type", "checkbox")
                .property("checked", true)
                .on("change", function () {
                    const checked = this.checked;
                    controls.selectAll(".line-toggle").property("checked", checked);
                    historicalLines.forEach(line => {
                        lineGroups[line.lineId].style("display", checked ? null : "none");
                    });
                });
            allLabel.append("span").text("All");

            historicalLines.forEach(line => {
                const label = controls.append("label");
                label.append("input")
                    .attr("type", "checkbox")
                    .attr("class", "line-toggle")
                    .property("checked", true)
                    .on("change", function () {
                        lineGroups[line.lineId].style("display", this.checked ? null : "none");
                    });
                label.append("span").attr("class", "route-swatch")
                    .style("background-color", companyColor(line.company));
                label.append("span").text(line.displayName);
            });

            function saveCurrentSvg() {
                const clone = svg.node().cloneNode(true);
                clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
                clone.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");
                const source = '<?xml version="1.0" standalone="no"?>\n'
                    + new XMLSerializer().serializeToString(clone);
                const blob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `nyc-transit-${currentYear}.svg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            document.addEventListener("keydown", (event) => {
                if (event.key === "ArrowLeft" && currentYear > MIN_YEAR) {
                    currentYear--;
                    renderYear(currentYear);
                } else if (event.key === "ArrowRight" && currentYear < MAX_YEAR) {
                    currentYear++;
                    renderYear(currentYear);
                } else if (event.shiftKey && (event.key === "S" || event.key === "s")) {
                    event.preventDefault();
                    saveCurrentSvg();
                }
            });

            renderYear(currentYear);
        });
    </script>
</body>

</html>
